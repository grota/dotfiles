"$schema" = 'https://starship.rs/config-schema.json'

[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = false
detect_env_vars = ['GROTA_KUBE_STARSHIP']

[battery]
disabled = true

[git_commit]
commit_hash_length = 7
format = '[\($hash$tag\)]($style) '
style = "green bold"
only_detached = false
disabled = false
tag_symbol = " 🏷  "
tag_disabled = false
tag_max_candidates = 0

